<!DOCTYPE html>

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>About | Xiaoqi Liu</title>
    <link href="https://fonts.googleapis.com/css2?family=Special+Elite&display=swap" rel="stylesheet">
    <style>
        :root {
            --main-orange: #ff9a44;
            --bg-color: #f9f9f9;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body { 
            font-family: 'Special Elite', serif; 
            background-color: var(--bg-color); 
            color: #333;
            overflow-x: hidden;
        }

        /* --- 导航栏 --- */
        nav {
            background: #111; padding: 20px 0; display: flex;
            justify-content: space-around; position: fixed;
            top: 0; width: 100%; z-index: 2000;
        }
        nav a { color: white; text-decoration: none; font-size: 1.3rem; transition: 0.3s; }
        nav a:hover { color: var(--main-orange); }

        .about-container {
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100vh;
            padding: 80px 10% 0;
            gap: 50px;
        }

        /* --- 左侧：图片叠加区域 --- */
        .image-stack {
            position: relative;
            flex: 1;
            max-width: 500px;
            height: 600px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .layer {
            position: absolute;
            width: 100%;
            height: auto;
            max-height: 100%;
            object-fit: contain;
            transition: all 0.6s cubic-bezier(0.4, 0, 0.2, 1);
            opacity: 0;
            transform: scale(0.95) translateY(10px);
        }

        .layer-base { opacity: 1; transform: scale(1) translateY(0); z-index: 1; }
        .layer.active { opacity: 1; transform: scale(1) translateY(0); z-index: 2; }

        /* --- 右侧：文字与图标列表 --- */
        .content-panel {
            flex: 1;
            max-width: 500px;
        }

        .intro-title {
            font-size: 3rem;
            margin-bottom: 40px;
            background: linear-gradient(to right, #ff7e5f, #ff9a44);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .tick-item {
            margin-bottom: 30px;
            display: flex;
            align-items: flex-start;
            cursor: pointer;
            transition: 0.3s;
            padding: 15px;
            border-radius: 12px;
        }

        .tick-item:hover { background: rgba(255, 154, 68, 0.08); }

        /* --- 自定义图标容器 --- */
        .icon-wrapper {
            width: 40px;
            height: 40px;
            margin-right: 20px;
            flex-shrink: 0;
            position: relative;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        /* 统一处理图标颜色：点击前为深灰色，点击后为橙色 */
        .icon-wrapper svg {
            width: 32px;
            height: 32px;
            transition: 0.3s;
        }

        /* 默认状态图标路径颜色 (Stroke) */
        .icon-default path { stroke: #999; } 
        /* 激活状态图标路径颜色 (Fill) */
        .icon-active path { fill: var(--main-orange); }

        /* 显隐逻辑 */
        .icon-active { display: none; }
        
        .tick-item.active .icon-default { display: none; }
        .tick-item.active .icon-active { display: block; }
        .tick-item.active .icon-wrapper { transform: scale(1.1); }

        .tick-text h3 { font-size: 1.5rem; margin-bottom: 5px; color: #111; transition: 0.3s; }
        .tick-item.active .tick-text h3 { color: var(--main-orange); }
        .tick-text p { font-size: 1rem; color: #666; line-height: 1.4; }

        /* 响应式 */
        @media (max-width: 900px) {
            .about-container { flex-direction: column; text-align: center; height: auto; padding-bottom: 50px; }
            .image-stack { height: 400px; width: 100%; }
            .tick-item { text-align: left; }
        }
    </style>
</head>

        function toggleLayer(layerId, element) {

            }
        }
