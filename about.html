    <style>
        :root {
            --gradient-start: #ff7e5f;
            --gradient-mid: #feb47b;
            --gradient-end: #ff9a44;
            --gradient-main: linear-gradient(to right, #ff7e5f, #feb47b, #ff9a44);
            --bg-color: #f9f9f9;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body { 
            font-family: 'Special Elite', serif; 
            background-color: var(--bg-color); 
            color: #333;
            overflow: hidden; 
        }

        /* --- 导航栏 --- */
        nav {
            background: #111; padding: 20px 0; display: flex;
            justify-content: space-around; position: fixed;
            top: 0; width: 100%; z-index: 2000;
        }
        nav a { color: white; text-decoration: none; font-size: 1.3rem; transition: 0.3s; }
        nav a:hover { color: #ff9a44; }

        .about-container {
            display: flex; align-items: center; justify-content: center;
            height: 100vh; padding: 80px 10% 0; gap: 60px; z-index: 5; position: relative;
        }

        /* --- 左侧图片堆叠 --- */
        .image-stack {
            position: relative; flex: 1; max-width: 500px; height: 600px;
            display: flex; align-items: center; justify-content: center;
        }
        .layer {
            position: absolute; width: 100%; height: auto; max-height: 100%;
            object-fit: contain; transition: all 0.6s cubic-bezier(0.4, 0, 0.2, 1);
            opacity: 0; transform: scale(0.95) translateY(10px);
        }
        .layer-base { opacity: 1; transform: scale(1) translateY(0); z-index: 1; }
        .layer.active { opacity: 1; transform: scale(1) translateY(0); z-index: 2; }

        /* --- 右侧交互面板 --- */
        .content-panel {
            flex: 1; max-width: 550px; height: 75%;
            display: flex; flex-direction: column; justify-content: space-between;
        }
        .intro-title {
            font-size: 3.5rem; background: var(--gradient-main);
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
            margin-bottom: 10px;
        }

        .tick-item {
            display: flex; align-items: flex-start; cursor: pointer;
            transition: all 0.3s; padding: 20px; border-radius: 12px;
        }
        .tick-item:hover { background: rgba(255, 154, 68, 0.08); }

        .icon-wrapper {
            width: 45px; height: 45px; margin-right: 25px; flex-shrink: 0;
            position: relative; display: flex; align-items: center; justify-content: center;
        }

        .icon-default { width: 36px; height: 36px; display: block; transition: 0.3s; }
        .icon-default path { stroke: #bbb; }
        .icon-active { width: 36px; height: 36px; display: none; }

        .tick-item.active .icon-default { display: none; }
        .tick-item.active .icon-active { display: block; }
        .tick-item.active .tick-text h3 { color: var(--gradient-end); }

        .tick-text h3 { font-size: 1.6rem; margin-bottom: 8px; color: #111; transition: 0.3s; }
        .tick-text p { font-size: 1rem; color: #666; line-height: 1.5; }

        /* --- 可拖拽贴纸 --- */
        .sticker { position: absolute; cursor: grab; z-index: 10; user-select: none; transition: transform 0.2s; }
        .sticker:active { cursor: grabbing; transform: scale(1.1); }
        .sticker img { width: 100%; height: auto; pointer-events: none; }

        #sticker-rocket { width: 80px; top: 120px; left: 5%; }
        #sticker-bird { width: 100px; top: 150px; right: 8%; }
        #sticker-flower { width: 120px; bottom: 100px; left: 8%; }
        #sticker-map { width: 150px; bottom: 80px; right: 5%; }
        #sticker-drink { width: 70px; top: 55%; left: 45%; }

        @media (max-width: 1024px) {
            .about-container { flex-direction: column; text-align: center; height: auto; padding-bottom: 50px; }
            .sticker { display: none; }
            .content-panel { height: auto; }
        }
    </style>
</head>

    <script>
        function toggleLayer(layerId, element) {
            element.classList.toggle('active');
            const imgLayer = document.getElementById('img-' + layerId);
            if (imgLayer) imgLayer.classList.toggle('active');
        }

        const stickers = document.querySelectorAll('.sticker');
        let activeSticker = null;
        let startX, startY, initialLeft, initialTop;

        stickers.forEach(sticker => {
            sticker.addEventListener('mousedown', startDragging);
            sticker.addEventListener('touchstart', startDragging, { passive: false });
        });

        function startDragging(e) {
            activeSticker = this;
            const clientX = e.type === 'touchstart' ? e.touches[0].clientX : e.clientX;
            const clientY = e.type === 'touchstart' ? e.touches[0].clientY : e.clientY;
            startX = clientX; startY = clientY;
            initialLeft = activeSticker.offsetLeft; initialTop = activeSticker.offsetTop;
            document.addEventListener('mousemove', drag);
            document.addEventListener('touchmove', drag, { passive: false });
            document.addEventListener('mouseup', stopDragging);
            document.addEventListener('touchend', stopDragging);
        }

        function drag(e) {
            if (!activeSticker) return;
            e.preventDefault();
            const clientX = e.type === 'touchmove' ? e.touches[0].clientX : e.clientX;
            const clientY = e.type === 'touchmove' ? e.touches[0].clientY : e.clientY;
            activeSticker.style.left = initialLeft + (clientX - startX) + 'px';
            activeSticker.style.top = initialTop + (clientY - startY) + 'px';
        }

        function stopDragging() {
            activeSticker = null;
            document.removeEventListener('mousemove', drag);
            document.removeEventListener('touchmove', drag);
        }
    </script>
