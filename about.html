<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>About | Xiaoqi Liu</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Special+Elite&display=swap" rel="stylesheet">
    <link href="https://api.mapbox.com/mapbox-gl-js/v2.15.0/mapbox-gl.css" rel="stylesheet">
    <script src="https://api.mapbox.com/mapbox-gl-js/v2.15.0/mapbox-gl.js"></script>

    <style>
        :root {
            --orange-color: #ff9a44;
            --leaf-green: #94d82d;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body, html { 
            height: 100%; font-family: 'Special Elite', serif; 
            background-color: #fff; color: #333; overflow: hidden; 
        }

        /* --- 导航栏 (全站统一) --- */
        nav {
            background: #111; padding: 20px 0; display: flex;
            justify-content: space-around; position: fixed;
            top: 0; width: 100%; z-index: 2000;
        }
        nav a { color: white; text-decoration: none; font-size: 1.3rem; transition: 0.3s; }
        nav a:hover { color: var(--orange-color); }

        .puzzle-wrapper {
            position: relative; height: 100vh; display: flex;
            flex-direction: column; align-items: center; justify-content: center;
        }

        .page-title {
            font-size: 2.8rem; margin-top: 40px; margin-bottom: 20px;
            background: linear-gradient(to right, #ff7e5f, #feb47b, #ff9a44);
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
            font-weight: bold; z-index: 10;
        }

        #drag-prompt {
            font-size: 1.2rem; color: var(--orange-color);
            animation: pulse 1.5s infinite; z-index: 10; margin-bottom: 20px;
        }

        /* --- 拼图底盘：全面虚线底稿 --- */
        .puzzle-base {
            position: relative; width: 450px; height: 450px;
            display: flex; align-items: center; justify-content: center;
        }

        /* 核心修改：全面细分虚线底稿 */
        .base-outline {
            position: absolute; width: 100%; height: 100%;
            fill: none; stroke: #eee; stroke-width: 2;
            stroke-dasharray: 8, 8; /* 虚线 */
            pointer-events: none;
            z-index: 0;
        }

        /* 放置槽位 (Drop Zones) */
        .drop-zone {
            position: absolute; width: 225px; height: 225px;
            z-index: 1;
        }
        
        /* 槽位坐标微调，确保虚线底稿与碎片精准重合 */
        .z1 { top: 30px; left: 30px; }
        .z2 { top: 30px; left: 195px; }
        .z3 { top: 160px; left: 30px; }
        .z4 { top: 160px; left: 195px; }
        .z5 { top: 280px; left: 112px; } /* 底瓣 */
        .z6 { top: -60px; left: 180px; } /* 叶子 */

        /* --- 拼图碎片 --- */
        .piece {
            position: absolute; width: 200px; height: 200px;
            cursor: grab; z-index: 100;
            filter: drop-shadow(0 4px 8px rgba(0,0,0,0.1));
            transition: transform 0.2s;
        }
        .piece.dragging { opacity: 0.6; cursor: grabbing; scale: 1.1; }
        /* 拼入后的状态：移除随机旋转，精准对齐 */
        .piece.snapped { position: absolute !important; transform: none !important; cursor: default; filter: none; }

        /* 碎片内的文字布局 */
        .piece-content {
            position: absolute; top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            width: 80%; color: white; text-align: center;
            pointer-events: none;
        }
        .piece-content h3 { font-size: 0.8rem; margin-bottom: 5px; opacity: 0.9; }
        .piece-content p { font-size: 0.95rem; line-height: 1.2; }

        /* 欢迎语 */
        #welcome-msg {
            position: fixed; bottom: 80px; font-size: 2.5rem;
            color: var(--orange-color); opacity: 0;
            transition: 2.5s ease-in-out; letter-spacing: 3px;
        }
        #welcome-msg.show { opacity: 1; }

        @keyframes pulse {
            0%, 100% { transform: scale(1); opacity: 1; } 50% { transform: scale(1.1); opacity: 0.7; }
        }
    </style>
</head>
<body>

    <nav>
        <a href="index.html">Home</a>
        <a href="about.html" style="color: var(--orange-color);">About</a>
        <a href="academic.html">Academic</a>
        <a href="travel.html">Travel</a>
        <a href="life.html">Life</a>
    </nav>

    <div class="puzzle-wrapper">
        <h1 class="page-title">Who is Xiaoqi?</h1>
        <div id="drag-prompt">-> Assemble my world <-</div>

        <div class="puzzle-base">
            <svg class="base-outline" viewBox="0 0 450 450">
                <circle cx="225" cy="225" r="180" />
                
                <line x1="225" y1="225" x2="225" y2="45" />    <line x1="225" y1="225" x2="405" y2="225" />   <line x1="225" y1="225" x2="135" y2="381" />   <line x1="225" y1="225" x2="315" y2="381" />   <line x1="225" y1="225" x2="45" y2="225" />    <path d="M225,45 Q260,10 320,30 Q280,60 225,45" />
            </svg>

            <div class="drop-zone z1" data-target="p1"></div>
            <div class="drop-zone z2" data-target="p2"></div>
            <div class="drop-zone z3" data-target="p3"></div>
            <div class="drop-zone z4" data-target="p4"></div>
            <div class="drop-zone z5" data-target="p5"></div>
            <div class="drop-zone z6" data-target="p6"></div>
        </div>

        <div id="welcome-msg">Welcome to My World.</div>

        <div class="piece p1" id="p1" draggable="true">
            <svg viewBox="0 0 200 200"><path d="M180,180 Q20,180 20,20 Q180,20 180,180" fill="#ffb86c"/></svg>
            <div class="piece-content"><h3>Born</h3><p>2000</p></div>
        </div>
        <div class="piece p2" id="p2" draggable="true">
            <svg viewBox="0 0 200 200"><path d="M20,180 Q180,180 180,20 Q20,20 20,180" fill="#ffa94d"/></svg>
            <div class="piece-content"><h3>MBTI</h3><p>ENFP</p></div>
        </div>
        <div class="piece p3" id="p3" draggable="true">
            <svg viewBox="0 0 200 200"><path d="M180,20 Q180,180 20,180 Q20,20 180,20" fill="#ff922b"/></svg>
            <div class="piece-content"><h3>PhD</h3><p>Cambridge</p></div>
        </div>
        <div class="piece p4" id="p4" draggable="true">
            <svg viewBox="0 0 200 200"><path d="M20,20 Q180,20 180,180 Q20,180 20,20" fill="#fd7e14"/></svg>
            <div class="piece-content"><h3>Art</h3><p>Music</p></div>
        </div>
        <div class="piece p5" id="p5" draggable="true">
            <svg viewBox="0 0 200 200"><path d="M20,20 Q100,180 180,20 L100,0 Z" fill="#e8590c"/></svg>
            <div class="piece-content" style="top:40%"><h3>Joy</h3><p>Travel</p></div>
        </div>
        <div class="piece p6" id="p6" draggable="true" style="width:140px; height:80px;">
            <svg viewBox="0 0 140 80"><path d="M0,45 Q40,0 140,20 Q80,70 0,45" fill="#94d82d"/></svg>
            <div class="piece-content"><p style="color:#2b450c; font-size:0.8rem;">Dream Café</p></div>
        </div>
    </div>

    <script>
        const pieces = document.querySelectorAll('.piece');
        const zones = document.querySelectorAll('.drop-zone');
        const welcome = document.getElementById('welcome-msg');
        const prompt = document.getElementById('drag-prompt');
        let count = 0;

        // 随机散落逻辑保持不变
        function scatter() {
            pieces.forEach(p => {
                const x = Math.random() > 0.5 ? Math.random()*150 : window.innerWidth - 300;
                const y = 150 + Math.random()*(window.innerHeight - 350);
                const r = (Math.random()-0.5)*40;
                p.style.left = x + 'px';
                p.style.top = y + 'px';
                p.style.transform = `rotate(${r}deg)`;
            });
        }
        window.onload = scatter;

        let dragged = null;
        pieces.forEach(p => {
            p.addEventListener('dragstart', () => { dragged = p; p.classList.add('dragging'); });
            p.addEventListener('dragend', () => p.classList.remove('dragging'));
        });

        zones.forEach(z => {
            z.addEventListener('dragover', e => e.preventDefault());
            z.addEventListener('drop', () => {
                if (dragged.id === z.getAttribute('data-target')) {
                    z.appendChild(dragged);
                    dragged.classList.add('snapped');
                    dragged.draggable = false;
                    count++;
                    if (count === 6) {
                        welcome.classList.add('show');
                        prompt.style.display = 'none';
                    }
                }
            });
        });
    </script>
</body>
</html>
