<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>About | Xiaoqi Liu</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Special+Elite&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --orange-main: #ff9a44;
            --leaf-green: #74b816;
            /* 每一瓣橙子的深浅微调，模拟果肉质感 */
            --c1: #ffb86c; --c2: #ffa94d; --c3: #ff922b; 
            --c4: #fd7e14; --c5: #e8590c; --c6: #94d82d; /* 叶子 */
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body, html { 
            height: 100%; font-family: 'Special Elite', serif; 
            background-color: #fff; color: #333; overflow: hidden; 
        }

        nav {
            background: #111; padding: 20px 0; display: flex;
            justify-content: space-around; position: fixed;
            top: 0; width: 100%; z-index: 2000;
        }
        nav a { color: white; text-decoration: none; font-size: 1.3rem; transition: 0.3s; }
        nav a:hover { color: var(--orange-main); }

        .puzzle-wrapper {
            position: relative; height: 100vh; display: flex;
            flex-direction: column; align-items: center; justify-content: center;
        }

        .page-title {
            font-size: 2.8rem; margin-top: 60px;
            background: linear-gradient(to right, #ff7e5f, #feb47b, #ff9a44);
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
            font-weight: bold; z-index: 10;
        }

        #drag-prompt {
            font-size: 1.2rem; color: var(--orange-main);
            animation: pulse 1.5s infinite; z-index: 10; margin-bottom: 10px;
        }

        /* --- 橙子底盘 (目标区域) --- */
        .orange-board {
            position: relative; width: 500px; height: 500px;
            border-radius: 50%; background: rgba(240, 240, 240, 0.3);
            border: 2px dashed #eee; z-index: 1;
        }

        /* 放置槽位通用样式 */
        .drop-zone {
            position: absolute; width: 100%; height: 100%;
            transition: 0.3s;
        }
        .drop-zone.hovered { background: rgba(255, 154, 68, 0.1); }

        /* --- 拼图碎片 (不规则形状) --- */
        .puzzle-piece {
            position: absolute; width: 250px; height: 250px;
            cursor: grab; display: flex; flex-direction: column;
            justify-content: center; align-items: center;
            text-align: center; color: white; padding: 20px;
            transition: transform 0.2s; z-index: 100;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
        }

        .puzzle-piece h3 { font-size: 0.7rem; opacity: 0.8; margin-bottom: 5px; }
        .puzzle-piece p { font-size: 0.9rem; line-height: 1.2; }

        /* --- Clip-path 路径定义 --- */
        /* 1. 左上果肉 */
        .p1 { clip-path: polygon(100% 100%, 0 100%, 0 0, 50% 0); background: var(--c1); }
        /* 2. 正上果肉 */
        .p2 { clip-path: polygon(50% 100%, 100% 100%, 100% 0, 0 0); background: var(--c2); }
        /* 3. 右侧果肉 */
        .p3 { clip-path: polygon(0 50%, 100% 0, 100% 100%, 0 100%); background: var(--c3); }
        /* 4. 左下果肉 */
        .p4 { clip-path: polygon(100% 0, 100% 100%, 0 100%, 0 50%); background: var(--c4); }
        /* 5. 正下果肉 */
        .p5 { clip-path: polygon(0 0, 100% 0, 50% 100%, 0 100%); background: var(--c5); }
        /* 6. 叶子 (梦) */
        .p6 { clip-path: ellipse(50% 35% at 50% 50%); background: var(--c6); color: #2b450c; }

        .puzzle-piece.dragging { opacity: 0.6; cursor: grabbing; z-index: 1000; scale: 1.1; }
        
        /* 拼入后的状态：移除随机旋转，精准对齐 */
        .puzzle-piece.snapped {
            position: absolute !important; transform: none !important;
            box-shadow: none; cursor: default;
        }

        /* 欢迎语 */
        #welcome-message {
            position: fixed; bottom: 80px; font-size: 2.5rem;
            color: var(--orange-main); opacity: 0;
            transition: 2s ease-in-out; letter-spacing: 2px;
        }
        #welcome-message.show { opacity: 1; }

        @keyframes pulse {
            0%, 100% { transform: scale(1); } 50% { transform: scale(1.1); }
        }

        /* PC端各个碎片在底盘内的最终定位坐标 */
        .drop-zone[data-piece="p1"] { top: 0; left: 0; }
        .drop-zone[data-piece="p2"] { top: 0; left: 250px; }
        .drop-zone[data-piece="p3"] { top: 125px; left: 250px; }
        .drop-zone[data-piece="p4"] { top: 250px; left: 0; }
        .drop-zone[data-piece="p5"] { top: 250px; left: 125px; }
        .drop-zone[data-piece="p6"] { top: -100px; left: 180px; width: 150px; height: 100px; }
    </style>
</head>
<body>

    <nav>
        <a href="index.html">Home</a>
        <a href="about.html" style="color: var(--orange-main);">About</a>
        <a href="academic.html">Academic</a>
        <a href="travel.html">Travel</a>
        <a href="life.html">Life</a>
    </nav>

    <div class="puzzle-wrapper">
        <h1 class="page-title">Who is Xiaoqi?</h1>
        <div id="drag-prompt">-> Slice the orange <-</div>

        <div class="orange-board">
            <div class="drop-zone" data-piece="p1"></div>
            <div class="drop-zone" data-piece="p2"></div>
            <div class="drop-zone" data-piece="p3"></div>
            <div class="drop-zone" data-piece="p4"></div>
            <div class="drop-zone" data-piece="p5"></div>
            <div class="drop-zone" data-piece="p6" style="border:none;"></div>
        </div>

        <div id="welcome-message">Welcome to My World.</div>

        <div class="puzzle-piece p1" draggable="true" id="p1"><h3>Gen.</h3><p>Born in 2000</p></div>
        <div class="puzzle-piece p2" draggable="true" id="p2"><h3>MBTI</h3><p>ENFP</p></div>
        <div class="puzzle-piece p3" draggable="true" id="p3"><h3>PhD</h3><p>Cambridge</p></div>
        <div class="puzzle-piece p4" draggable="true" id="p4"><h3>Art</h3><p>Piano & Flute</p></div>
        <div class="puzzle-piece p5" draggable="true" id="p5"><h3>Joy</h3><p>Travel & Sing</p></div>
        <div class="puzzle-piece p6" draggable="true" id="p6"><h3>Dream</h3><p>Cozy Café</p></div>
    </div>

    <script>
        const pieces = document.querySelectorAll('.puzzle-piece');
        const welcome = document.getElementById('welcome-message');
        const prompt = document.getElementById('drag-prompt');
        let snappedCount = 0;

        // 1. 随机散落
        function scatter() {
            pieces.forEach(p => {
                const x = Math.random() > 0.5 ? Math.random()*150 : window.innerWidth - 350;
                const y = 150 + Math.random()*(window.innerHeight - 350);
                const r = (Math.random()-0.5)*60;
                p.style.left = x + 'px';
                p.style.top = y + 'px';
                p.style.transform = `rotate(${r}deg)`;
            });
        }
        window.onload = scatter;

        // 2. 拖放逻辑
        let dragged = null;
        pieces.forEach(p => {
            p.addEventListener('dragstart', (e) => {
                dragged = p;
                p.classList.add('dragging');
            });
            p.addEventListener('dragend', () => p.classList.remove('dragging'));
        });

        const zones = document.querySelectorAll('.drop-zone');
        zones.forEach(z => {
            z.addEventListener('dragover', e => e.preventDefault());
            z.addEventListener('drop', e => {
                const targetId = z.getAttribute('data-piece');
                if (dragged.id === targetId) {
                    z.appendChild(dragged);
                    dragged.classList.add('snapped');
                    dragged.draggable = false;
                    snappedCount++;
                    if (snappedCount === 6) {
                        welcome.classList.add('show');
                        prompt.style.display = 'none';
                    }
                }
            });
        });
    </script>
</body>
</html>
