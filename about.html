<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>About | Xiaoqi Liu</title>
    <link href="https://fonts.googleapis.com/css2?family=Special+Elite&display=swap" rel="stylesheet">
    <style>
        :root {
            /* 统一全站的渐变色系 */
            --gradient-start: #ff7e5f;
            --gradient-mid: #feb47b;
            --gradient-end: #ff9a44;
            --gradient-main: linear-gradient(to right, #ff7e5f, #feb47b, #ff9a44);
            
            --bg-color: #f9f9f9;
            --text-gray: #666;
            --title-black: #111;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body { 
            font-family: 'Special Elite', serif; 
            background-color: var(--bg-color); 
            color: #333;
            overflow-x: hidden;
        }

        /* --- 1. 导航栏 (全站统一) --- */
        nav {
            background: #111; padding: 20px 0; display: flex;
            justify-content: space-around; position: fixed;
            top: 0; width: 100%; z-index: 2000;
        }
        nav a { color: white; text-decoration: none; font-size: 1.3rem; transition: 0.3s; }
        nav a:hover { color: #ff9a44; }

        .about-container {
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100vh;
            padding: 80px 10% 0; /* 预留顶部导航空间 */
            gap: 60px; /* 增大左右间距 */
        }

        /* --- 左侧：图片叠加区域 (保持原逻辑) --- */
        .image-stack {
            position: relative;
            flex: 1;
            max-width: 500px;
            height: 600px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .layer {
            position: absolute;
            width: 100%;
            height: auto;
            max-height: 100%;
            object-fit: contain;
            transition: all 0.6s cubic-bezier(0.4, 0, 0.2, 1);
            opacity: 0;
            transform: scale(0.95) translateY(10px);
        }

        .layer-base { opacity: 1; transform: scale(1) translateY(0); z-index: 1; }
        .layer.active { opacity: 1; transform: scale(1) translateY(0); z-index: 2; }

        /* --- 右侧：文字与交互图标 --- */
        .content-panel {
            flex: 1;
            max-width: 550px; /* 略微加宽 */
            height: 70%; /* 限制文字区高度 */
            display: flex;
            flex-direction: column;
            justify-content: space-between; /* --- 修改核心：让内容在垂直方向均匀分布，更分散 --- */
        }

        .intro-title {
            font-size: 3.5rem;
            line-height: 1.1;
            padding-bottom: 20px;
            /* --- 修改：标题应用渐变色 --- */
            background: var(--gradient-main);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            filter: drop-shadow(2px 2px 4px rgba(0,0,0,0.1));
        }

        .tick-item {
            display: flex;
            align-items: flex-start;
            cursor: pointer;
            transition: all 0.3s;
            padding: 20px; /* 增大内边距 */
            border-radius: 12px;
            /* 增大项目间距，使整体更充实 */
            margin-bottom: 20px;
        }

        .tick-item:hover { background: rgba(255, 154, 68, 0.08); }

        /* --- 图标容器 --- */
        .icon-wrapper {
            width: 45px;
            height: 45px;
            margin-right: 25px;
            flex-shrink: 0;
            position: relative;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        /* 默认 SVG：灰色 */
        .icon-default {
            display: block;
            width: 36px; height: 36px;
            transition: 0.3s;
        }
        .icon-default path { stroke: #bbb; } /* 初始灰色 */

        /* 激活 SVG：隐藏 */
        .icon-active {
            display: none;
            width: 36px; height: 36px;
        }

        /* --- 核心修改：交互后图标应用与标题一致的渐变 --- */
        .tick-item.active .icon-default { display: none; }
        .tick-item.active .icon-active { display: block; }
        .tick-item.active .icon-wrapper { transform: scale(1.1); }

        .tick-text h3 { font-size: 1.6rem; margin-bottom: 8px; color: var(--title-black); transition: 0.3s; }
        .tick-item.active .tick-text h3 { color: var(--gradient-end); } /* 激活时标题颜色微调 */
        .tick-text p { font-size: 1rem; color: var(--text-gray); line-height: 1.5; }

        /* 响应式 */
        @media (max-width: 1024px) {
            .about-container { flex-direction: column; text-align: center; height: auto; padding-bottom: 50px; }
            .image-stack { height: 400px; width: 100%; margin-bottom: 40px;}
            .content-panel { height: auto; justify-content: flex-start;}
            .tick-item { text-align: left; }
        }
    </style>
</head>

        function toggleLayer(layerId, element) {
            // 切换激活类
            element.classList.toggle('active');
            
            // 切换图片图层
            const imgLayer = document.getElementById('img-' + layerId);
            if (imgLayer) {
                imgLayer.classList.toggle('active');
            }
        }
    </script>
