<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Travel Map | Xiaoqi Liu</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Special+Elite&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --main-orange: #ff9a44;
            --gradient: linear-gradient(to right, #ff7e5f, #feb47b, #ff9a44);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        /* 全局打字机风格 */
        body { 
            font-family: 'Special Elite', serif; 
            background: #111; /* 深色背景让地图和橙色圆圈更突出 */
            color: white; 
            overflow: hidden; 
            height: 100vh; 
        }

        /* --- 统一导航栏 --- */
        nav {
            background: #111;
            padding: 20px 0;
            display: flex;
            justify-content: space-around;
            position: fixed;
            top: 0;
            width: 100%;
            z-index: 1000;
        }
        nav a {
            color: white;
            text-decoration: none;
            font-size: 1.3rem;
            letter-spacing: 1px;
            transition: 0.3s;
        }
        nav a:hover { 
            color: var(--main-orange); 
            transform: scale(1.05);
        }

        /* 艺术标题样式 */
        .page-title { 
            font-size: 3.5rem; 
            text-align: center; 
            padding: 100px 0 20px; /* 为导航栏留出空间 */
            background: var(--gradient);
            -webkit-background-clip: text; 
            -webkit-text-fill-color: transparent;
            font-weight: bold;
        }

        /* 地图容器 */
        .map-container {
            position: relative;
            width: 90vw; 
            max-width: 1200px;
            height: 65vh;
            margin: 0 auto;
            /* 确保图片路径正确 */
            background: url('images/artmap.png') no-repeat center center/contain;
        }

        /* 可点击的橙色圆圈 */
        .map-point {
            position: absolute;
            width: 22px; 
            height: 22px;
            background-color: rgba(255, 154, 68, 0.5); 
            border: 2px solid var(--main-orange);
            border-radius: 50%;
            cursor: pointer;
            box-shadow: 0 0 15px rgba(255, 154, 68, 0.7);
            transition: all 0.3s ease;
            z-index: 5;
        }
        
        .map-point:hover {
            transform: scale(1.4);
            background-color: rgba(255, 154, 68, 0.9);
            box-shadow: 0 0 25px rgba(255, 154, 68, 1);
        }

        /* 城市标签：同样使用打字机字体 */
        .map-point::after {
            content: attr(data-city);
            position: absolute; 
            top: -35px; 
            left: 50%;
            transform: translateX(-50%);
            background: rgba(255, 255, 255, 0.9); 
            color: #111; 
            padding: 4px 10px;
            border-radius: 2px; 
            font-size: 0.9rem;
            white-space: nowrap; 
            opacity: 0; 
            transition: opacity 0.3s;
            font-family: 'Special Elite', serif;
            pointer-events: none;
        }
        .map-point:hover::after { opacity: 1; }

        /* --- 坐标位置 (根据你的 artmap.png 比例手动微调) --- */
        .point-barcelona { top: 38%; left: 47%; }
        .point-seville { top: 42%; left: 45%; }
        .point-venice { top: 35%; left: 51%; }

        /* 针对小屏幕的微调 */
        @media (max-width: 768px) {
            .page-title { font-size: 2.2rem; }
            nav a { font-size: 1rem; }
            .map-container { height: 50vh; }
        }
    </style>
</head>
<body>

    <nav>
        <a href="index.html">Home</a>
        <a href="academic.html">Academic</a>
        <a href="travel.html" style="color: #ff9a44;">Travel</a>
        <a href="life.html">Life</a>
    </nav>

    <h1 class="page-title">Travel Map</h1>

    <div class="map-container">
        <a href="barcelona.html" class="map-point point-barcelona" data-city="Barcelona"></a>
        <a href="seville.html" class="map-point point-seville" data-city="Seville"></a>
        <a href="venice.html" class="map-point point-venice" data-city="Venice"></a>
    </div>

</body>
</html>
