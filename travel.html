<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Travel | Xiaoqi Liu</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Special+Elite&display=swap" rel="stylesheet">
    <link href="https://api.mapbox.com/mapbox-gl-js/v2.15.0/mapbox-gl.css" rel="stylesheet">
    <script src="https://api.mapbox.com/mapbox-gl-js/v2.15.0/mapbox-gl.js"></script>

    <style>
        :root { --main-orange: #ff9a44; }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body { 
            font-family: 'Special Elite', serif; 
            background: #111; 
            color: white; 
            overflow: hidden; 
            height: 100vh; 
        }

        /* --- 导航栏 --- */
        nav {
            background: rgba(17, 17, 17, 0.7);
            backdrop-filter: blur(10px); /* 毛玻璃效果 */
            padding: 20px 0;
            display: flex;
            justify-content: space-around;
            position: fixed;
            top: 0; width: 100%; z-index: 1000;
            border-bottom: 1px solid rgba(255,255,255,0.1);
        }
        nav a { 
            color: white; 
            text-decoration: none; 
            font-size: 1.2rem; 
            transition: 0.3s; 
        }
        nav a:hover { color: var(--main-orange); }

        /* 全屏地图容器 */
        #map { position: absolute; top: 0; bottom: 0; width: 100%; }

        /* 浮动标题 */
        .map-overlay {
            position: absolute;
            top: 100px; left: 50%;
            transform: translateX(-50%);
            z-index: 10;
            text-align: center;
            pointer-events: none;
        }
        .map-overlay h1 {
            font-size: 3.5rem;
            background: linear-gradient(to right, #ff7e5f, #feb47b, #ff9a44);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            letter-spacing: 5px;
            filter: drop-shadow(0 5px 15px rgba(0,0,0,0.5));
        }

        /* --- Mapbox 弹出框样式定制 --- */
        .mapboxgl-popup { z-index: 20; }
        .mapboxgl-popup-content {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(5px);
            color: #222;
            border-radius: 12px;
            padding: 0; /* 让图片填满顶部 */
            overflow: hidden;
            box-shadow: 0 15px 35px rgba(0,0,0,0.5);
            border: none;
        }
        .mapboxgl-popup-close-button {
            color: #fff; font-size: 20px; padding: 10px; z-index: 30;
        }
        
        .popup-card { width: 220px; }
        .popup-img {
            width: 100%; height: 160px;
            object-fit: cover;
            display: block;
        }
        .popup-text { padding: 15px; }
        .popup-title { 
            font-family: 'Special Elite', serif;
            font-weight: bold; font-size: 1.2rem; 
            margin-bottom: 5px; color: #111; 
        }
        .popup-date { font-size: 0.85rem; color: #666; }

        /* --- 动态发光标记点 --- */
        .marker {
            width: 18px; height: 18px;
            background: var(--main-orange);
            border: 2px solid white;
            border-radius: 50%;
            cursor: pointer;
            box-shadow: 0 0 10px var(--main-orange), 0 0 20px var(--main-orange);
            transition: transform 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }
        .marker:hover { transform: scale(1.5); }

    </style>
</head>
<body>

    <nav>
        <a href="index.html">Home</a>
        <a href="academic.html">Academic</a>
        <a href="travel.html" style="color: var(--main-orange);">Travel</a>
        <a href="life.html">Life</a>
    </nav>

    <div class="map-overlay">
        <h1>Travel Shots</h1>
    </div>

    <div id="map"></div>

    <script>
        // 你的真实 Token
        mapboxgl.accessToken = 'pk.eyJ1IjoidmFtcGlyZTciLCJhIjoiY2s2Z2NkcmU0MWh5djNsbXd1YTJ1a3M3OCJ9.QCaAry4KAI3VFJXsJGXG8w';

        const map = new mapboxgl.Map({
            container: 'map',
            style: 'mapbox://styles/mapbox/dark-v11', // 深色艺术风格
            center: [8, 42], // 初始中心点（欧洲中部）
            zoom: 3.8, 
            pitch: 45, // 倾斜视角，更有立体感
            bearing: -10
        });

        // 旅游数据
        const locations = [
            {
                name: 'Barcelona',
                date: 'Aug 2023',
                coords: [2.1734, 41.3851],
                img: 'images/barcelona_thumb.jpg' 
            },
            {
                name: 'Seville',
                date: 'Aug 2023',
                coords: [-5.9845, 37.3891],
                img: 'images/seville_thumb.jpg'
            },
            {
                name: 'Venice',
                date: 'Oct 2022',
                coords: [12.3155, 45.4408],
                img: 'images/venice_thumb.jpg'
            }
        ];

        // 遍历并添加标记点
        locations.forEach(loc => {
            const el = document.createElement('div');
            el.className = 'marker';

            const popup = new mapboxgl.Popup({ 
                offset: 30,
                closeButton: true,
                maxWidth: 'none'
            }).setHTML(`
                <div class="popup-card">
                    <img src="${loc.img}" class="popup-img" onerror="this.src='https://via.placeholder.com/220x160?text=Travel+Photo'">
                    <div class="popup-text">
                        <div class="popup-title">${loc.name}</div>
                        <div class="popup-date">${loc.date}</div>
                    </div>
                </div>
            `);

            // 创建 Marker 并添加到地图
            const marker = new mapboxgl.Marker(el)
                .setLngLat(loc.coords)
                .setPopup(popup)
                .addTo(map);

            // 点击点位时，地图自动平移到中心
            el.addEventListener('click', () => {
                map.flyTo({
                    center: loc.coords,
                    zoom: 6,
                    speed: 1.2,
                    curve: 1.42
                });
            });
        });

        // 添加地图缩放工具
        map.addControl(new mapboxgl.NavigationControl(), 'bottom-right');
    </script>
</body>
</html>
