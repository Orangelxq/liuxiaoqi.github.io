<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Travel | Xiaoqi Liu</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Special+Elite&display=swap" rel="stylesheet">
    <link href="https://api.mapbox.com/mapbox-gl-js/v2.15.0/mapbox-gl.css" rel="stylesheet">
    <script src="https://api.mapbox.com/mapbox-gl-js/v2.15.0/mapbox-gl.js"></script>

    <style>
        :root { --main-orange: #ff9a44; }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body { 
            font-family: 'Special Elite', serif; 
            background: #111; 
            color: white; 
            overflow: hidden; 
            height: 100vh; 
        }

        /* --- 导航栏 --- */
        nav {
            background: rgba(17, 17, 17, 0.8);
            backdrop-filter: blur(10px);
            padding: 20px 0;
            display: flex;
            justify-content: space-around;
            position: fixed;
            top: 0; width: 100%; z-index: 1000;
            border-bottom: 1px solid rgba(255,255,255,0.1);
        }
        nav a { 
            color: white; 
            text-decoration: none; 
            font-size: 1.2rem; 
            transition: 0.3s; 
        }
        nav a:hover { color: var(--main-orange); }

        /* 全屏地图容器 */
        #map { position: absolute; top: 0; bottom: 0; width: 100%; }

        /* 浮动标题 */
        .map-overlay {
            position: absolute;
            top: 100px; left: 50%;
            transform: translateX(-50%);
            z-index: 10;
            text-align: center;
            pointer-events: none;
        }
        .map-overlay h1 {
            font-size: 3.5rem;
            background: linear-gradient(to right, #ff7e5f, #feb47b, #ff9a44);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            letter-spacing: 5px;
            filter: drop-shadow(0 5px 15px rgba(0,0,0,0.5));
        }

        /* --- Mapbox 弹出框自定义样式 --- */
        .mapboxgl-popup { z-index: 20; }
        .mapboxgl-popup-content {
            background: rgba(255, 255, 255, 0.98);
            color: #222;
            border-radius: 12px;
            padding: 0;
            overflow: hidden;
            box-shadow: 0 15px 35px rgba(0,0,0,0.5);
            border: none;
        }
        
        .popup-card { width: 260px; } /* 略微加宽以展示照片 */
        
        /* 多图滚动容器 */
        .popup-image-container {
            max-height: 280px; /* 限制高度 */
            overflow-y: auto;  /* 纵向滚动 */
            display: flex;
            flex-direction: column;
            gap: 2px;
            background: #eee;
        }

        /* 滚动条美化 */
        .popup-image-container::-webkit-scrollbar { width: 5px; }
        .popup-image-container::-webkit-scrollbar-thumb { background: var(--main-orange); border-radius: 10px; }

        .popup-img {
            width: 100%;
            height: auto;
            display: block;
            object-fit: cover;
        }

        .popup-text { padding: 15px; background: white; }
        .popup-title { 
            font-family: 'Special Elite', serif;
            font-weight: bold; font-size: 1.3rem; 
            margin-bottom: 5px; color: #111; 
        }
        .popup-date { font-size: 0.9rem; color: #666; }

        /* --- 标记点 --- */
        .marker {
            width: 20px; height: 20px;
            background: var(--main-orange);
            border: 2px solid white;
            border-radius: 50%;
            cursor: pointer;
            box-shadow: 0 0 15px var(--main-orange);
            transition: transform 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }
        .marker:hover { transform: scale(1.5); }

    </style>
</head>
<body>

    <nav>
        <a href="index.html">Home</a>
        <a href="academic.html">Academic</a>
        <a href="travel.html" style="color: var(--main-orange);">Travel</a>
        <a href="life.html">Life</a>
    </nav>

    <div class="map-overlay">
        <h1>Travel Shots</h1>
    </div>

    <div id="map"></div>

    <script>
        // 你的 Mapbox Token
        mapboxgl.accessToken = 'pk.eyJ1IjoidmFtcGlyZTciLCJhIjoiY2s2Z2NkcmU0MWh5djNsbXd1YTJ1a3M3OCJ9.QCaAry4KAI3VFJXsJGXG8w';

        const map = new mapboxgl.Map({
            container: 'map',
            style: 'mapbox://styles/mapbox/dark-v11', 
            center: [8, 42], 
            zoom: 3.8, 
            pitch: 45, 
            bearing: -10
        });

        // 旅游数据
        const locations = [
            {
                name: 'Venice',
                date: 'Mar 2026',
                coords: [12.3155, 45.4408],
                images: ['images/venice1.jpg', 'images/venice2.jpg', 'images/venice3.jpg']
            },
            {
                name: 'Barcelona',
                date: 'Apr 2026',
                coords: [2.1734, 41.3851],
                images: ['images/barcelona1.jpg', 'images/barcelona2.jpg', 'images/barcelona3.jpg'] 
            },
            {
                name: 'Seville',
                date: 'Dec 2025',
                coords: [-5.9845, 37.3891],
                images: ['images/sevila1.jpg', 'images/sevila2.jpg', 'images/sevila3.jpg']
            }
        ];

        // 遍历并添加点位
        locations.forEach(loc => {
            const el = document.createElement('div');
            el.className = 'marker';

            // 生成多图 HTML
            const imagesHtml = loc.images.map(img => 
                `<img src="${img}" class="popup-img" onerror="this.src='https://via.placeholder.com/260x180?text=Photo+Coming+Soon'">`
            ).join('');

            const popup = new mapboxgl.Popup({ 
                offset: 30,
                closeButton: true,
                maxWidth: 'none'
            }).setHTML(`
                <div class="popup-card">
                    <div class="popup-image-container">
                        ${imagesHtml}
                    </div>
                    <div class="popup-text">
                        <div class="popup-title">${loc.name}</div>
                        <div class="popup-date">${loc.date}</div>
                    </div>
                </div>
            `);

            new mapboxgl.Marker(el)
                .setLngLat(loc.coords)
                .setPopup(popup)
                .addTo(map);

            // 点击平移效果
            el.addEventListener('click', () => {
                map.flyTo({
                    center: loc.coords,
                    zoom: 6,
                    speed: 1.2,
                    curve: 1.42
                });
            });
        });

        map.addControl(new mapboxgl.NavigationControl(), 'bottom-right');
    </script>
</body>
</html>
