<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>Travel Map | Xiaoqi Liu</title>
    <link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@700&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        /* 使用和主页一样的背景色或图片，让地图“悬浮” */
        body { font-family: 'Helvetica Neue', Arial, sans-serif; background: #111; color: white; overflow: hidden; height: 100vh; }
        
        .page-title { 
            font-family: 'Dancing Script', cursive; 
            font-size: 3rem; text-align: center; padding: 30px 0;
            background: linear-gradient(to right, #ff7e5f, #feb47b, #ff9a44);
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
            position: absolute; top: 0; width: 100%; z-index: 10;
        }

        /* 地图容器 */
        .map-container {
            position: relative;
            width: 90vw; max-width: 1200px;
            height: 70vh;
            margin: 100px auto 0; /* 留出标题空间 */
            background: url('images/artmap.png') no-repeat center center/contain;
            /* 如果没有地图图片，可以暂时用这个半透明背景测试：
            background-color: rgba(255,255,255,0.05); border-radius: 20px; */
        }

        /* 可点击的橙色圆圈通用样式 */
        .map-point {
            position: absolute;
            width: 25px; height: 25px;
            background-color: rgba(255, 154, 68, 0.6); /* 透明橙色 */
            border: 2px solid #ff9a44;
            border-radius: 50%;
            cursor: pointer;
            box-shadow: 0 0 15px rgba(255, 154, 68, 0.8);
            transition: all 0.3s ease;
            z-index: 5;
        }
        .map-point:hover {
            transform: scale(1.3);
            background-color: rgba(255, 154, 68, 0.9);
            box-shadow: 0 0 25px rgba(255, 154, 68, 1);
        }

        /* 鼠标悬停时的城市标签 */
        .map-point::after {
            content: attr(data-city); /* 获取 data-city 属性内容 */
            position: absolute; top: -30px; left: 50%;
            transform: translateX(-50%);
            background: rgba(0,0,0,0.8); padding: 5px 10px;
            border-radius: 4px; font-size: 0.8rem;
            white-space: nowrap; opacity: 0; transition: opacity 0.3s;
        }
        .map-point:hover::after { opacity: 1; }

        /* --- 城市确切位置 (需要根据你的地图图片调整百分比) --- */
        
        /* 西班牙 - 巴塞罗那 */
        .point-barcelona { top: 38%; left: 47%; }
        /* 西班牙 - 塞维利亚 */
        .point-seville { top: 42%; left: 45%; }
        /* 意大利 - 威尼斯 */
        .point-venice { top: 35%; left: 51%; }

    </style>
</head>
<body>
    <h1 class="page-title">My Travel Map</h1>

    <div class="map-container">
        <a href="barcelona.html" class="map-point point-barcelona" data-city="Barcelona, Spain"></a>
        <a href="seville.html" class="map-point point-seville" data-city="Seville, Spain"></a>
        <a href="venice.html" class="map-point point-venice" data-city="Venice, Italy"></a>
    </div>
</body>
</html>
