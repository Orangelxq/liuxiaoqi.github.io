<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Xiaoqi Liu | Personal Website</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Special+Elite&display=swap" rel="stylesheet">

    <style>
        /* 1. 基础重置 */
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body, html { 
            height: 100%; 
            font-family: 'Special Elite', serif; 
            overflow: hidden; 
            background-color: #111; 
        }

        /* 2. 背景与主视觉区 */
        .hero {
            height: 100vh;
            /* 请确保 images 文件夹中有 background.png */
            background: linear-gradient(rgba(0,0,0,0.35), rgba(0,0,0,0.35)), 
                        url('images/background.png') no-repeat center center/cover;
            display: flex;
            align-items: center;
            padding-left: 10%;
        }

        /* 3. 顶部导航栏 (Fixed Top) */
        nav {
            position: fixed;
            top: 0;
            width: 100%;
            padding: 45px 0; 
            display: flex;
            justify-content: space-around; 
            z-index: 1000;
        }
        
        nav a {
            color: white;
            text-decoration: none;
            font-size: 1.5rem;
            letter-spacing: 2px;
            transition: all 0.3s ease;
            text-shadow: 2px 2px 5px rgba(0,0,0,0.7); 
        }
        
        nav a:hover { 
            transform: scale(1.1); 
            color: #ff9a44;
        }

        /* 4. 主标题样式 (两行展示 + 渐变) */
        .intro-text {
            font-size: 5rem;
            line-height: 1.1; /* 紧凑的行间距更有艺术感 */
            background: linear-gradient(to right, #ff7e5f, #feb47b, #ff9a44);
            -webkit-background-clip: text; 
            -webkit-text-fill-color: transparent; 
            opacity: 0;
            transform: translateX(-40px);
            animation: fadeInUp 2s ease-out forwards;
            filter: drop-shadow(3px 3px 6px rgba(0,0,0,0.4));
        }

        /* 5. 底部联系方式栏 (Fixed Bottom) */
        footer {
            position: fixed;
            bottom: 0;
            width: 100%;
            padding: 35px 8%;
            background: rgba(0, 0, 0, 0.45); /* 半透明遮罩 */
            backdrop-filter: blur(8px); /* 毛玻璃模糊 */
            display: flex;
            justify-content: space-around;
            z-index: 1000;
            border-top: 1px solid rgba(255, 255, 255, 0.15);
            animation: fadeIn 3.5s ease-in;
        }

        .contact-item {
            text-align: left;
        }

        .contact-label {
            display: block;
            font-size: 0.85rem;
            color: #bbb; /* 次要信息灰色 */
            margin-bottom: 8px;
            letter-spacing: 2px;
            text-transform: uppercase;
        }

        .contact-value {
            display: block;
            font-size: 1.1rem;
            color: white;
            letter-spacing: 1px;
            text-decoration: none;
            transition: color 0.3s;
        }

        .contact-value:hover {
            color: #ff9a44;
        }

        /* 6. 动画定义 */
        @keyframes fadeInUp {
            to { opacity: 1; transform: translateX(0); }
        }

        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        /* 7. 手机端适配 */
        @media (max-width: 768px) {
            .intro-text { font-size: 3rem; }
            nav { padding: 25px 0; }
            nav a { font-size: 1.1rem; }
            footer { 
                flex-direction: column; 
                gap: 25px; 
                text-align: center;
                padding: 25px;
                backdrop-filter: none; /* 手机端关闭模糊以提升性能 */
            }
            .contact-item { text-align: center; }
        }
    </style>
</head>
<body>

    <nav>
        <a href="about.html">About</a>
        <a href="academic.html">Academic</a>
        <a href="travel.html">Travel</a>
        <a href="life.html">Life</a>
    </nav>

    <div class="hero">
        <h1 class="intro-text">
            Hi,<br>
            This is Xiaoqi Liu
        </h1>
    </div>

    <footer>
                <div class="contact-item">

            <span class="contact-label">Email</span>

            <a href="mailto:nataliexiaoqiliu617@gmail.com" class="contact-value">nataliexiaoqiliu617@gmail.com</a>

        </div>

        <div class="contact-item">

            <span class="contact-label">Instagram</span>

            <span class="contact-value">@orange_lx777</span>

        </div>

        <div class="contact-item">

            <span class="contact-label">Rednote</span>

            <span class="contact-value">@橙子快去画画</span>

        </div>
    </footer>

</body>
</html>
