<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Xiaoqi Liu | Personal Website</title>
    <style>
        /* 基础样式重置 */
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body, html { height: 100%; font-family: 'Helvetica Neue', Arial, sans-serif; overflow: hidden; }

        /* 背景图片设置 */
        .hero {
            height: 100vh;
            background: linear-gradient(rgba(0,0,0,0.3), rgba(0,0,0,0.3)), 
                        url('images/background.png') no-repeat center center/cover;
            display: flex;
            align-items: center;
            padding-left: 10%;
        }

        /* 顶部导航栏 */
        nav {
            position: fixed;
            top: 0;
            width: 100%;
            padding: 30px 50px;
            display: flex;
            justify-content: flex-end;
            z-index: 1000;
        }
        nav a {
            color: white;
            text-decoration: none;
            margin-left: 40px;
            font-weight: 300;
            letter-spacing: 1px;
            transition: opacity 0.3s;
        }
        nav a:hover { opacity: 0.7; }

        /* 左侧渐现动画 */
        .intro-text {
            color: white;
            font-size: 3.5rem;
            font-weight: 200;
            opacity: 0;
            transform: translateX(-20px);
            animation: fadeInUp 1.5s ease forwards;
        }

        @keyframes fadeInUp {
            to {
                opacity: 1;
                transform: translateX(0);
            }
        }
    </style>
</head>
<body>

    <nav>
        <a href="about.html">About</a>
        <a href="academic.html">Academic</a>
        <a href="travel.html">Travel</a>
        <a href="life.html">Life</a>
    </nav>

    <div class="hero">
        <h1 class="intro-text">Hi, I am Xiaoqi Liu</h1>
    </div>

</body>
</html>
