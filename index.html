<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Xiaoqi Liu | Personal Website</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Special+Elite&display=swap" rel="stylesheet">

    <style>
        /* 基础样式重置 */
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        /* 全局使用打字机字体 */
        body, html { 
            height: 100%; 
            font-family: 'Special Elite', serif; 
            overflow: hidden; 
            background-color: #111; /* 备用背景色 */
        }

        /* 背景图片设置 */
        .hero {
            height: 100vh;
            /* 确保图片路径和后缀正确 */
            background: linear-gradient(rgba(0,0,0,0.3), rgba(0,0,0,0.3)), 
                        url('images/background.png') no-repeat center center/cover;
            display: flex;
            align-items: center;
            padding-left: 10%;
        }

        /* 顶部导航栏：平均分布 */
        nav {
            position: fixed;
            top: 0;
            width: 100%;
            padding: 40px 0; 
            display: flex;
            justify-content: space-around; 
            z-index: 1000;
        }
        
        nav a {
            color: white;
            text-decoration: none;
            font-size: 1.6rem; /* 打字机字体通常偏大，略微调整尺寸 */
            letter-spacing: 2px;
            transition: all 0.3s ease;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.6); 
        }
        
        nav a:hover { 
            transform: scale(1.1); 
            color: #ff9a44; /* 悬停时变为橙色，增加互动感 */
        }

        /* 主标题样式：渐变橙色 + 动画 */
        .intro-text {
            font-size: 4.5rem;
            line-height: 1.2;
            
            /* 设置橙色渐变 */
            background: linear-gradient(to right, #ff7e5f, #feb47b, #ff9a44);
            -webkit-background-clip: text; 
            -webkit-text-fill-color: transparent; 
            
            opacity: 0;
            transform: translateX(-30px);
            animation: fadeInUp 2s ease-out forwards;
            filter: drop-shadow(2px 2px 5px rgba(0,0,0,0.3));
        }

        /* 动画：从左侧划入并渐显 */
        @keyframes fadeInUp {
            to {
                opacity: 1;
                transform: translateX(0);
            }
        }

        /* 针对手机端的适配 */
        @media (max-width: 768px) {
            .intro-text { font-size: 2.8rem; }
            nav a { font-size: 1.1rem; }
            .hero { padding-left: 5%; }
        }
    </style>
</head>
<body>

    <nav>
        <a href="about.html">About</a>
        <a href="academic.html">Academic</a>
        <a href="travel.html">Travel</a>
        <a href="life.html">Life</a>
    </nav>

    <div class="hero">
        <h1 class="intro-text">Hi, I am Xiaoqi Liu</h1>
    </div>

</body>
</html>
