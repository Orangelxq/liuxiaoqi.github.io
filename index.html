<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Xiaoqi Liu | Personal Website</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@700&display=swap" rel="stylesheet">

    <style>
        /* 基础样式重置 */
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        /* 全局使用艺术字体 */
        body, html { 
            height: 100%; 
            font-family: 'Dancing Script', cursive; 
            overflow: hidden; 
        }

        /* 背景图片设置 */
        .hero {
            height: 100vh;
            /* 这里的图片后缀请确保和你仓库里的 background.png 一致 */
            background: linear-gradient(rgba(0,0,0,0.3), rgba(0,0,0,0.3)), 
                        url('images/background.png') no-repeat center center/cover;
            display: flex;
            align-items: center;
            padding-left: 10%;
        }

        /* 顶部导航栏：平均分布 */
        nav {
            position: fixed;
            top: 0;
            width: 100%;
            padding: 40px 0; /* 增加上下间距 */
            display: flex;
            justify-content: space-around; /* 平均分布选项 */
            z-index: 1000;
        }
        
        nav a {
            color: white;
            text-decoration: none;
            font-size: 1.8rem; /* 增大导航字体 */
            font-weight: 700;
            letter-spacing: 2px;
            transition: all 0.3s ease;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.5); /* 增加阴影，防止背景太亮看不清文字 */
        }
        
        nav a:hover { 
            transform: scale(1.1); /* 悬停时稍微放大 */
            opacity: 0.8; 
        }

        /* 主标题样式：渐变橙色 + 动画 */
        .intro-text {
            font-size: 5rem;
            font-weight: 700;
            
            /* 设置橙色渐变 */
            background: linear-gradient(to right, #ff7e5f, #feb47b, #ff9a44);
            -webkit-background-clip: text; /* 将背景裁剪到文字上 */
            -webkit-text-fill-color: transparent; /* 让文字颜色透明，显示背景渐变 */
            
            opacity: 0;
            transform: translateX(-30px);
            animation: fadeInUp 2s ease-out forwards;
            filter: drop-shadow(2px 2px 5px rgba(0,0,0,0.2));
        }

        /* 动画：从左侧划入并渐显 */
        @keyframes fadeInUp {
            to {
                opacity: 1;
                transform: translateX(0);
            }
        }

        /* 针对手机端的适配 */
        @media (max-width: 768px) {
            .intro-text { font-size: 3rem; }
            nav a { font-size: 1.2rem; }
        }
    </style>
</head>
<body>

    <nav>
        <a href="about.html">About</a>
        <a href="academic.html">Academic</a>
        <a href="travel.html">Travel</a>
        <a href="life.html">Life</a>
    </nav>

    <div class="hero">
        <h1 class="intro-text">Hi, I am Xiaoqi Liu</h1>
    </div>

</body>
</html>
