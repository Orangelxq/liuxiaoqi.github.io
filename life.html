<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>Life Moments | Xiaoqi Liu</title>
    <link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@700&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Helvetica Neue', Arial, sans-serif; background: #222; color: white; padding-bottom: 50px; }
        
        .page-title { 
            font-family: 'Dancing Script', cursive; 
            font-size: 4rem; text-align: center; padding: 50px 0;
            background: linear-gradient(to right, #ff7e5f, #feb47b, #ff9a44);
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
        }

        /* 瀑布流/卡片网格 */
        .gallery {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(250px, 1fr));
            grid-gap: 15px;
            max-width: 1200px; margin: 0 auto; padding: 0 20px;
        }
        
        .gallery-item { position: relative; overflow: hidden; border-radius: 8px; cursor: pointer; }
        .gallery-item img { width: 100%; height: 100%; object-fit: cover; transition: transform 0.5s; }
        .gallery-item:hover img { transform: scale(1.1); }
        
        .gallery-desc {
            position: absolute; bottom: 0; left: 0; width: 100%;
            background: linear-gradient(transparent, rgba(0,0,0,0.8));
            padding: 15px; opacity: 0; transition: opacity 0.3s;
        }
        .gallery-item:hover .gallery-desc { opacity: 1; }
    </style>
</head>
<body>
    <h1 class="page-title">Life & Moments</h1>
    <div class="gallery">
        <div class="gallery-item">
            <img src="images/life1.jpg" alt="Life Moment 1">
            <div class="gallery-desc">A beautiful sunset</div>
        </div>
        <div class="gallery-item">
            <img src="images/life2.jpg" alt="Life Moment 2">
            <div class="gallery-desc">Weekend hiking trip</div>
        </div>
    </div>
</body>
</html>
